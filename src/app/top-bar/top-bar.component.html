<div id="top-bar">
  <!-- Left -->
  <div>
    <app-time-panel [universe]="universe" style="height: 100%" />
    <select
      class="system-select"
      (change)="
        universe.switchSystem(
          universe.systems[$any($event.target).selectedIndex]
        )
      "
    >
      @for (system of universe.systems; track $index) {
        <option>{{ system.name }}</option>
      }
    </select>
  </div>

  <!-- Center -->
  <div></div>
  
  <!-- Right -->
  <div></div>
</div>
