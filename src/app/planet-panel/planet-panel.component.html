<div id="planet-panel">
  <h1 id="planet-name">{{ planet.name }}</h1>

  <table>
    <tr>
      <td>Position</td>
      <td>{{ positionToString() }}</td>
    </tr>
    <tr>
      <td>Mass</td>
      <td>{{ planet.mass }}</td>
    </tr>
    <tr>
      <td>Size</td>
      <td>{{ planet.size }}</td>
    </tr>
  </table>
</div>
